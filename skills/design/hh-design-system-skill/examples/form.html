<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HH · Form Pattern</title>
<link rel="stylesheet" href="../assets/tokens.css">
<link rel="stylesheet" href="../assets/components.css">
<style>
  body { background: var(--hh-bg); color: var(--hh-text-1); font-family: var(--hh-font-sans); margin: 0; padding-top: 76px; }
  .container { max-width: 800px; margin: 0 auto; padding: var(--hh-space-12) var(--hh-space-8); }
  .hh-app-header { position: fixed; top: 0; left: 0; right: 0; z-index: var(--hh-z-header); }
  .hh-app-navbar { position: fixed; top: var(--hh-header-h); left: 0; right: 0; z-index: var(--hh-z-navbar); }
  .form-section-title { font-size: var(--hh-fs-label); color: var(--hh-text-3); text-transform: uppercase; letter-spacing: 0.05em; margin: var(--hh-space-12) 0 var(--hh-space-6); padding-bottom: var(--hh-space-3); border-bottom: 1px solid var(--hh-border-1); font-weight: var(--hh-fw-semibold); }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--hh-space-12); }
  .form-footer { display: flex; justify-content: flex-end; gap: var(--hh-space-3); margin-top: var(--hh-space-16); padding-top: var(--hh-space-12); border-top: 1px solid var(--hh-border-1); }
  .page-title { font-size: var(--hh-fs-h3); font-weight: var(--hh-fw-semibold); color: var(--hh-text-1); margin-bottom: var(--hh-space-3); }
  .page-desc { font-size: var(--hh-fs-data); color: var(--hh-text-3); margin-bottom: var(--hh-space-12); }
</style>
</head>
<body>

<div class="hh-app-header">
  <div class="hh-app-header-left">
    <div style="width:24px;height:24px;background:var(--hh-brand-500);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px">HH</div>
    <div>
      <span class="hh-app-header-title">COMPENSACIONES</span>
      <span class="hh-app-header-sub">Nueva regla</span>
    </div>
  </div>
</div>

<div class="hh-app-navbar">
  <button class="hh-app-nav-btn">Dashboard</button>
  <button class="hh-app-nav-btn active">Reglas</button>
  <button class="hh-app-nav-btn">Cálculos</button>
  <button class="hh-app-nav-btn">Historial</button>
</div>

<div class="container">

  <nav class="hh-breadcrumb" style="margin-bottom:var(--hh-space-8)">
    <a href="#">Reglas</a>
    <span class="hh-breadcrumb-sep">/</span>
    <span class="hh-breadcrumb-current">Nueva Regla</span>
  </nav>

  <div class="page-title">Nueva Regla de Comisión</div>
  <div class="page-desc">Define los parámetros de cálculo para una nueva regla de nómina.</div>

  <div class="form-section-title">Identificación</div>
  <div class="form-grid-2">
    <div class="hh-form-group">
      <label class="hh-label">Nombre de la Regla</label>
      <input class="hh-input" placeholder="ej. Vendedores Premium Q2">
    </div>
    <div class="hh-form-group">
      <label class="hh-label">Vigente Desde</label>
      <input class="hh-input" type="date">
    </div>
    <div class="hh-form-group">
      <label class="hh-label">Cluster</label>
      <select class="hh-select">
        <option>Premium</option>
        <option>Standard</option>
        <option>Express</option>
      </select>
    </div>
    <div class="hh-form-group">
      <label class="hh-label">Rol</label>
      <select class="hh-select">
        <option>Vendedor</option>
        <option>Sub-Gerente</option>
        <option>Gerente</option>
      </select>
    </div>
  </div>

  <div class="form-section-title">Cálculo</div>
  <div class="form-grid-2">
    <div class="hh-form-group">
      <label class="hh-label">Tasa Base (%)</label>
      <input class="hh-input" placeholder="0.00">
      <div class="hh-help">Comisión sobre ventas brutas</div>
    </div>
    <div class="hh-form-group">
      <label class="hh-label">Bono por Tier</label>
      <input class="hh-input" placeholder="0">
      <div class="hh-help">Bono fijo cuando se alcanza la meta</div>
    </div>
  </div>

  <div class="hh-form-group" style="margin-top:var(--hh-space-12)">
    <label class="hh-label">Notas Internas</label>
    <textarea class="hh-textarea" placeholder="Notas internas para esta regla..."></textarea>
  </div>

  <div class="form-section-title">Estado</div>
  <div style="display:flex;gap:var(--hh-space-8);margin-top:var(--hh-space-3)">
    <label class="hh-checkbox"><input type="checkbox" checked> Activa al guardar</label>
    <label class="hh-checkbox"><input type="checkbox"> Aplicar a nóminas pasadas</label>
  </div>

  <div class="form-footer">
    <button class="hh-btn hh-btn--secondary">Cancelar</button>
    <button class="hh-btn hh-btn--ghost">Guardar como Borrador</button>
    <button class="hh-btn hh-btn--primary">Publicar Regla</button>
  </div>

</div>

</body>
</html>
